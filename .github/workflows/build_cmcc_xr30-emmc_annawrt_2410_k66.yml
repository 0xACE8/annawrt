name: Build cmcc_xr30-emmc annawrt 24.10 kernel 6.6 actions.

on:
  workflow_dispatch:
    inputs:
      restore_config:
        description: 'Restore Configuration 🇯🇵 設定を復元'
        type: boolean
        default: false
      telegram_notify:
        description: 'Telegram Notification 🇯🇵 Telegram通知'
        type: boolean
        default: false
      upload_firmware:
        description: 'Upload to Artifacts　 🇯🇵 Artifactに保存'
        type: boolean
        default: false
      upload_release:
        description: 'Upload to Release　　 🇯🇵 Releaseに公開'
        type: boolean
        default: false
#  schedule:
#    - cron: '0 19 * * 0'

env:
  # annawrt 2410
  PONLY2410_K66_REPO_LINK:              ${{ secrets.PONLY2410_K66_REPO_LINK }}
  PONLY2410_K66_REPO_TREE:              ${{ secrets.PONLY2410_K66_REPO_TREE }}
  PONLY2410_K66_REPO_DIFF:              ${{ secrets.PONLY2410_K66_REPO_DIFF }}
  # cmcc-xr30-emmc
  CMCC_XR30_EMMC_PONLY2410_K66_PATCHES: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PATCHES }}
  CMCC_XR30_EMMC_PONLY2410_K66_PROFILE: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PROFILE }}
  CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE }}
  # access token
  ACCESS_TOKEN:                         ${{ secrets.ACCESS_TOKEN }}
  # feeds source
  ADD_EXTRA_SOURCE:                     ${{ secrets.ADD_EXTRA_SOURCE }}
  # check sha512sum
  ACCESS_SHA512SUM:                     ${{ secrets.ACCESS_SHA512SUM }}
  ACCESS_REPACKAGE:                     ${{ secrets.ACCESS_REPACKAGE }}
  # cmcc color sytle for argon
  ARGON_THEME_CMCC:                     ${{ secrets.ARGON_THEME_CMCC }}
  # telegram bot
  TELEGRAM_BOT_KEY:                     ${{ secrets.TELEGRAM_BOT_KEY }}
  TELEGRAM_CHAT_ID:                     ${{ secrets.TELEGRAM_CHAT_ID }}
  # hardware & repo info
  DEVICE_NAME:                          CMCC_XR30-EMMC
  TARGET_CHIP:                          mt7981b
  TARGET_DISK:                          8GB_eMMC
  SOURCE_CODE:                          padavanonly
  KERNEL_VERS:                          kernel_6.6
  OUTPUT_FILE:                          annawrt-24.10-k6.6-ace-mt7981b-cmcc_xr30-emmc-sysupgrade
  TZ: "Asia/Tokyo"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout (チェックアウト)
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Pre-Free Disk Space (ディスク解放前の準備)
      run: |
        echo "ディスク解放前の準備"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Optimize Disk Space (ディスク容量の最適化)
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Free Disk Space (ディスク空き容量の確保)
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 8192
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Check Server Performance (サーバー性能の確認)
      run: |
        echo "⚠️注意⚠️"
        echo "サーバーのリソースは有限です。プラグインの過剰な選択はCPU高負荷の原因となります。"
        echo -e "既知のCPUモデル（降順）: 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "-------------------------CPU 情報---------------------------"
        echo "CPUの物理数  : $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPUコア数    : $(nproc)"
        echo -e "CPUモデル情報:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "------------------------メモリ情報--------------------------"
        echo "メモリの詳細:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "---------------------ハードディスク情報---------------------"
        echo "ディスク容量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialize Environment (環境の初期化)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt -yqq update
        sudo -E apt -yqq full-upgrade
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E apt -yqq install zip rename dos2unix libfuse-dev
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq install cargo
        rustup target add aarch64-unknown-linux-musl
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Setup Git Credentials (Git認証情報の設定)
      run: |
        git config --global url."https://$ACCESS_TOKEN@github.com/0xACE8/".insteadOf "https://github.com/0xACE8/"
        
    - name: Clone Source Code (ソースコードのクローン)
      working-directory: ./
      run: |
        df -hT $PWD
        git clone $PONLY2410_K66_REPO_LINK -b $PONLY2410_K66_REPO_TREE openwrt
        cd openwrt
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PATCHES }}
        echo "CMCC_XR30_EMMC_PONLY2410_K66_PATCH done."
        ${{ secrets.ADD_EXTRA_SOURCE }}
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

        # Remove China Mirrors (中国国内ミラーの削除)
        PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
        if [ -f "$PROJECT_MIRRORS_FILE" ]; then
          sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
        fi

    - name: Generate Variables (環境変数の生成)
      run: |
        SOURCE_REPO="$(echo $PONLY2410_K66_REPO_LINK | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV

    - name: Cache Toolchain (ツールチェーンのキャッシュ)
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: true
        mixkey: MT7981b-${{ env.SOURCE_CODE }}-${{ env.SOURCE_REPO }}-${{ env.KERNEL_VERS }}-${{ secrets.PONLY2410_K66_REPO_BRANCH }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: Update & Install Feeds (フィードの更新とインストール)
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/sbwml/packages_lang_golang -b 25.x feeds/packages/lang/golang
        ./scripts/feeds install -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration (カスタム設定の読み込み)
      working-directory: ./openwrt
      id: loadconfig
      run: |
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PROFILE }}
        ${{ secrets.PONLY2410_K66_REPO_DIFF }}
        ${{ secrets.ARGON_THEME_CMCC }}

    - name: Restore Config Archive (設定アーカイブの復元)
      if: steps.loadconfig.outcome == 'success' && (github.event.inputs.restore_config == 'true' || contains(github.event.action, 'restore_config')) && !cancelled()
      working-directory: ./openwrt
      run: |
        rm -rf files
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE }}
        echo "OUTPUT_FILE=annawrt-24.10-k6.6-ace-mt7981b-cmcc_xr30-emmc-configured-sysupgrade" >> $GITHUB_ENV

    - name: Boost Wi-Fi 5G Signal (Wi-Fi 5G信号の増幅)
      if: steps.loadconfig.outcome == 'success' && !cancelled()
      working-directory: ./openwrt
      run: |
        ${{ secrets.BOOST_5G_TO_25DBM }}

    - name: Download Packages (パッケージのダウンロード)
      if: steps.loadconfig.outcome == 'success' && !cancelled()
      working-directory: ./openwrt
      id: package
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware (ファームウェアのコンパイル)
      working-directory: ./openwrt
      id: compile
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc) + 1)) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Update Variables (変数の更新)
      run: |
        echo "OUTPUT_FILE=${OUTPUT_FILE}_${FILE_DATE}" >> $GITHUB_ENV

    - name: Check Disk Usage (ディスク使用量の確認)
      if: (!cancelled())
      run: df -hT

    - name: Notify Compilation Error (コンパイルエラーの通知)
      if: steps.compile.outcom != 'success' && (github.event.inputs.telegram_notify == 'true' || contains(github.event.action, 'telegram_notify')) && !cancelled()
      env:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_KEY }}
      run: |
        curl -s -o /dev/null -X GET "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_KEY }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=❌%20コンパイルに失敗しました！%20❌%0A%0A＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝%0A・🛜支援デバイス:%0A　%20　${{ env.DEVICE_NAME }}%0Aーーーーーーーーーーーーーーーーー%0A・💽フラッシュは:%0A　%20　${{ env.TARGET_DISK }}%0Aーーーーーーーーーーーーーーーーー%0A・🧿カーネル使用:%0A　%20　${{ env.KERNEL_VERS }}%0Aーーーーーーーーーーーーーーーーー%0A・📝ソースコード:%0A　%20　${{ env.SOURCE_CODE }}%0Aーーーーーーーーーーーーーーーーー%0A・📦リポジトリを:%0A　%20　${{ env.SOURCE_REPO }}%0Aーーーーーーーーーーーーーーーーー%0A・🔀ブランチ名前:%0A　%20　${{ secrets.PONLY2410_K66_REPO_TREE }}%0Aーーーーーーーーーーーーーーーーー%0A・❌エラーの時間:%0A　%20　$(date +'%Y年%m月%d日_%H時%M分')%0A＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝%0A"

    - name: Organize Files (ファイルの整理)
      id: organize
      if: steps.compile.outcom == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        ls | grep -v *sysupgrade.bin | xargs rm -rdf
        mv *.bin ${{ env.OUTPUT_FILE }}.bin
        sha512sums ${{ secrets.ACCESS_SHA512SUM }} sha512sums ${{ env.OUTPUT_FILE }}.bin
        ${{ secrets.ACCESS_REPACKAGE }} ${{ env.OUTPUT_FILE }}.bin
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload to Artifacts (Artifactに保存)
      if: steps.organize.outcom == 'success' && (github.event.inputs.upload_firmware == 'true' || contains(github.event.action, 'upload_firmware')) && !cancelled()
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.OUTPUT_FILE }}
        path: ${{ env.FIRMWARE }}

    - name: Notify Compilation Success (コンパイル成功の通知)
      if: steps.organize.outcom == 'success' && (github.event.inputs.telegram_notify == 'true' || contains(github.event.action, 'telegram_notify')) && !cancelled()
      run: |
        curl -s -o /dev/null -X GET "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_KEY }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=✅%20コンパイルが成功しました！%20✅%0A%0A＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝%0A・🛜支援デバイス:%0A　%20　${{ env.DEVICE_NAME }}%0Aーーーーーーーーーーーーーーーーー%0A・💽フラッシュは:%0A　%20　${{ env.TARGET_DISK }}%0Aーーーーーーーーーーーーーーーーー%0A・🧿カーネル使用:%0A　%20　${{ env.KERNEL_VERS }}%0Aーーーーーーーーーーーーーーーーー%0A・📝ソースコード:%0A　%20　${{ env.SOURCE_CODE }}%0Aーーーーーーーーーーーーーーーーー%0A・📦リポジトリを:%0A　%20　${{ env.SOURCE_REPO }}%0Aーーーーーーーーーーーーーーーーー%0A・🔀ブランチ名前:%0A　%20　${{ secrets.PONLY2410_K66_REPO_TREE }}%0Aーーーーーーーーーーーーーーーーー%0A・📁ファイル名前:%0A　%20　${{ env.OUTPUT_FILE}}%0A＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝%0A"

    - name: Generate Release Tag (リリースタグの生成)
      run: |
        RELEASE_TAG="$TARGET_CHIP-$DEVICE_NAME-$TARGET_DISK-$KERNEL_VERS-$FILE_DATE"
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

    - name: Upload to Release (Releaseに公開)
      if: steps.organize.outcom == 'success' && (github.event.inputs.upload_release == 'true' || contains(github.event.action, 'upload_release')) && !cancelled()
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.TARGET_CHIP }}_${{ env.DEVICE_NAME }}_${{ env.TARGET_DISK }}_${{ env.KERNEL_VERS }}_${{ env.FILE_DATE }}
        allowUpdates: false
        tag: ${{ env.RELEASE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE }}/*
        body: |
          **本ファームウェアは、CPU「${{ env.TARGET_CHIP }}」搭載のモデル「${{ env.DEVICE_NAME }}」✅ ${{ env.TARGET_DISK }} ✅専用です。**
          ### 📒「${{ env.SOURCE_CODE }}」のソースコードを基にビルドされました。
          - 🛜 支援デバイス: ${{ env.DEVICE_NAME }}
          - 💽 フラッシュは: ${{ env.TARGET_DISK }}
          - 🧿 カーネル使用: ${{ env.KERNEL_VERS }}
          - 📝 ソースコード: ${{ env.SOURCE_CODE }}
          - 📦 リポジトリを: ${{ env.SOURCE_REPO }}
          - 🔀 ブランチ名前: ${{ secrets.PONLY2410_K66_REPO_TREE }}
          - 🌐 接続アドレス: 192.168.***.1 または ${{ env.SOURCE_CODE }}.lan
          - 🔑 パスワードは: なし
          ### ⚠️ 免責事項 ⚠️
          - ‼️ **本ファームウェアは、個人利用を目的とした非公式のカスタマイズ版です。**
          - ⛔️ **強制フラッシュ等でデバイスが破損した場合、本リポジトリは一切の責任を負いません。自己責任で使用してください。**

    - name: Delete Old Workflows (古いワークフローの削除)
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 2

    - name: Delete Old Releases (古いリリースの削除)
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 2
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
